# tmux-thumbs: match kubernetes resource names
# Pod: <name>-<replicaset-hash>-<5-char-suffix>
set -g @thumbs-regexp-1 '[a-z0-9]([-a-z0-9]*[a-z0-9])?-[bcdfghjklmnpqrstvwxz2-9]{8,10}-[a-z0-9]{5}'
# ReplicaSet: <name>-<replicaset-hash>
set -g @thumbs-regexp-2 '[a-z0-9]([-a-z0-9]*[a-z0-9])?-[bcdfghjklmnpqrstvwxz2-9]{8,10}'
