# tmux-thumbs: match kubernetes resource names.
# The middle segment is a generic [a-z0-9]{8,10} so it covers both Deployment
# pod-template-hashes and CronJob/Job numeric timestamps (which contain 0/1).
# Pod: <name>-<hash|jobid>-<5-char-suffix>
set -g @thumbs-regexp-1 '[a-z0-9](?:[-a-z0-9]*[a-z0-9])?-[a-z0-9]{8,10}-[a-z0-9]{5}'
# ReplicaSet / Job: <name>-<hash|jobid>
set -g @thumbs-regexp-2 '[a-z0-9](?:[-a-z0-9]*[a-z0-9])?-[a-z0-9]{8,10}'
